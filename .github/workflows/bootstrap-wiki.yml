name: Bootstrap Wiki
on:
  workflow_dispatch:
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Bootstrap wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Rana Faraz"
          git config --global user.email "faraz.ahmed@iub.edu.pk"
          mkdir /tmp/wiki && cd /tmp/wiki
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/ranafaraz/PathwAI.wiki.git"
          echo "# PathwAI" > Home.md
          echo "" >> Home.md
          echo "Wiki initialization." >> Home.md
          git add Home.md
          git commit -m "docs: initialize wiki"
          git push -u origin HEAD:master