name: Push Wiki Content
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "push" to confirm pushing wiki content'
        required: true
        default: ''
jobs:
  push-wiki:
    if: github.event.inputs.confirm == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Push wiki content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Rana Faraz"
          git config --global user.email "faraz.ahmed@iub.edu.pk"
          
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki
          
          # Copy wiki content from docs/wiki/ to the wiki repo
          cp docs/wiki/*.md /tmp/wiki/
          
          cd /tmp/wiki
          git add .
          git commit -m "docs: update wiki content" || echo "No changes to commit"
          git push origin master